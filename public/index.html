<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Emissor Pavao - Produção Visual</title>
    <style>
        /* --- ESTILOS DA TELA --- */
        body { font-family: Arial, sans-serif; background-color: #333; margin: 0; padding: 20px; text-align: center; }
        .controles { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: inline-block; text-align: left;}
        button { padding: 10px 15px; cursor: pointer; background-color: #0056b3; color: white; border: none; border-radius: 5px; font-weight: bold; }
        .btn-success { background-color: #28a745; margin-left: 10px; display: none; }
        
        #painelCoordenadas {
            position: fixed; top: 10px; right: 10px; background: #ffeb3b; color: black; 
            padding: 10px 20px; border-radius: 5px; font-weight: bold; font-size: 16px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5); display: none; z-index: 1000;
        }

        /* --- A FOLHA VIRTUAL (24x14) --- */
        .folha {
            width: 24cm; 
            height: 14cm; 
            background-image: url('Novo Projeto (3).jpg'); /* COLOQUE SUA FOTO AQUI */
            background-size: 24cm 14cm;
            background-position: top left;
            background-repeat: no-repeat;
            background-color: white;
            margin: 0 auto 20px auto;
            position: relative; 
            box-shadow: 0 0 15px rgba(0,0,0,0.8);
            overflow: hidden;
            text-align: left;
        }

        /* --- OS TEXTOS --- */
        .campo {
            position: absolute;
            font-family: 'Courier New', Courier, monospace; 
            font-size: 8pt; /* A FONTE MENOR QUE VOCÊ PEDIU */
            font-weight: bold;
            color: black;
            white-space: pre;
            cursor: move; 
            user-select: none; 
            padding: 2px;
        }
        
        .campo:hover { background-color: rgba(255, 255, 0, 0.4); outline: 1px dashed red; }

        /* --- NA HORA DE IMPRIMIR --- */
      /* --- NA HORA DE IMPRIMIR --- */
        @media print {
            body { background: white; margin: 0; padding: 0; }
            .controles, #painelCoordenadas { display: none !important; } 
            .campo:hover { background-color: transparent; outline: none; }
            
            @page { 
                size: 24cm 14cm; 
                margin: 0; 
            }

            .folha { 
                background-image: none !important; 
                box-shadow: none; 
                
                /* FIX: Zera as margens para não estourar os 14cm do @page */
                margin: 0 !important; 
                padding: 0 !important;
                
                /* SEUS AJUSTES DE CALIBRAÇÃO FINA (X, Y) */
                /* O transform move o visual sem alterar o tamanho do bloco! */
                transform: translate(-2.4cm, 0.24cm); 
                
                page-break-inside: avoid;
                page-break-after: always; 
            }

            /* Evita que a última folha gere uma página extra no final do PDF */
            .folha:last-child {
                page-break-after: auto;
            }
        }
    </style>
</head>
<body>

<div id="painelCoordenadas">Arraste um item</div>

<div class="controles">
    <h2>Emissor Visual de Fichas</h2>
    <input type="file" id="arquivoExcel" accept=".xlsx, .xls">
    <button onclick="processarPlanilha()">1. Carregar Dados Reais</button>
    <button id="btnImprimir" class="btn-success" onclick="window.print()">2. Imprimir Direto</button>
    <div id="visualizacao"></div>
</div>

<div id="areaImpressao"></div>

<script>
    let motoristasGlobais = [];

    // LENDO OS DADOS REAIS DO SERVIDOR
    async function processarPlanilha() {
        const fileInput = document.getElementById('arquivoExcel');
        if (fileInput.files.length === 0) {
            alert("Selecione um arquivo Excel primeiro!");
            return;
        }

        const formData = new FormData();
        formData.append("planilha", fileInput.files[0]);

        try {
            document.getElementById('visualizacao').innerHTML = "<p>Processando...</p>";
            
            const response = await fetch('/processar-excel', { method: 'POST', body: formData });
            motoristasGlobais = await response.json();
            
            if (motoristasGlobais.length > 0) {
                document.getElementById('visualizacao').innerHTML = `<p style="color:green">✔ ${motoristasGlobais.length} motoristas carregados com sucesso.</p>`;
                
                gerarTelasVisuais();
                document.getElementById('btnImprimir').style.display = 'inline-block';
                
                // Mantém o arrastar ativado caso você queira ajustar um motorista específico
                document.querySelectorAll('.campo').forEach(ativarArraste);
            } else {
                document.getElementById('visualizacao').innerHTML = `<p style="color:red">Nenhum dado encontrado na planilha.</p>`;
            }
        } catch (e) {
            alert("Erro ao carregar dados. O servidor (Node.js/Python) está rodando?");
            document.getElementById('visualizacao').innerHTML = "";
        }
    }

    function gerarTelasVisuais() {
        const area = document.getElementById('areaImpressao');
        area.innerHTML = ""; 

        motoristasGlobais.forEach(mot => {
            let html = `<div class="folha">`;

            // CABEÇALHO (Com as suas coordenadas calibradas!)
            html += `<div class="campo" style="top: 0.74cm; left: 14.63cm;">OS: ${mot.os || ""}</div>`;
           html += `<div class="campo" style="top: 1.14cm; left: 6.22cm;">${mot.empresa || ""}</div>`;
            html += `<div class="campo" style="top: 1.14cm; left: 12.41cm;">${(mot.nome || "").substring(0, 30)}</div>`; // Protege contra nome vazio
            html += `<div class="campo" style="top: 1.14cm; left: 19.00cm;">${mot.data || ""}</div>`;
            html += `<div class="campo" style="top: 1.59cm; left: 6.24cm;">${mot.filial || ""}</div>`;
            html += `<div class="campo" style="top: 1.59cm; left: 12.41cm;">${mot.id || ""}</div>`;
            html += `<div class="campo" style="top: 1.59cm; left: 18.94cm;">${mot.funcao || ""}</div>`;

            // VIAGENS
            let topoViagem = 2.75; 
            // Se o motorista não tiver viagens, cria um array vazio para não quebrar o código
            const viagens = mot.viagens || []; 
            
            viagens.forEach(v => {
                html += `<div class="campo" style="top: ${topoViagem}cm; left: 2.67cm;">${v.linha || ""}</div>`;
                html += `<div class="campo" style="top: ${topoViagem}cm; left: 4.68cm;">${v.veiculo || ""}</div>`;
                html += `<div class="campo" style="top: ${topoViagem}cm; left: 7.12cm;">${v.checkList1 || ""}</div>`;
                html += `<div class="campo" style="top: ${topoViagem}cm; left: 9.13cm;">${v.deslocamento1 || ""}</div>`;
                html += `<div class="campo" style="top: ${topoViagem}cm; left: 10.74cm;">${v.pontoInicial || ""}</div>`;
                html += `<div class="campo" style="top: ${topoViagem}cm; left: 12.49cm;">${v.pontoFinal || ""}</div>`;
                html += `<div class="campo" style="top: ${topoViagem}cm; left: 14.37cm;">${v.deslocamento2 || ""}</div>`;
                html += `<div class="campo" style="top: ${topoViagem}cm; left: 15.95cm;">${v.checkList2 || ""}</div>`;
                topoViagem += 0.7; 
            });

            html += `</div>`;
            area.innerHTML += html;
        });
    }

    // ==========================================
    // SCRIPT DE DRAG AND DROP (ARRASTAR)
    // ==========================================
    function ativarArraste(elemento) {
        let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
        const painel = document.getElementById('painelCoordenadas');

        elemento.onmousedown = function(e) {
            e.preventDefault();
            pos3 = e.clientX;
            pos4 = e.clientY;
            document.onmouseup = soltarElemento;
            document.onmousemove = arrastarElemento;
            painel.style.display = 'block';
        };

        function arrastarElemento(e) {
            e.preventDefault();
            pos1 = pos3 - e.clientX;
            pos2 = pos4 - e.clientY;
            pos3 = e.clientX;
            pos4 = e.clientY;
            
            elemento.style.top = (elemento.offsetTop - pos2) + "px";
            elemento.style.left = (elemento.offsetLeft - pos1) + "px";
        }

        function soltarElemento() {
            document.onmouseup = null;
            document.onmousemove = null;

            let cmTop = (elemento.offsetTop / 37.795).toFixed(2);
            let cmLeft = (elemento.offsetLeft / 37.795).toFixed(2);

            painel.innerHTML = `Novo local: <b>top: ${cmTop}cm; left: ${cmLeft}cm;</b>`;
            
            elemento.style.top = cmTop + "cm";
            elemento.style.left = cmLeft + "cm";
        }
    }
</script>

</body>
</html>
