<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impressão Matricial - Ficha de Serviços</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f9; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { font-size: 22px; color: #333; border-bottom: 2px solid #ccc; padding-bottom: 10px; }
        .upload-area { margin-bottom: 20px; padding: 20px; border: 2px dashed #ccc; text-align: center; }
        button { padding: 10px 15px; font-size: 16px; cursor: pointer; background-color: #0056b3; color: white; border: none; border-radius: 5px; }
        button:hover { background-color: #004494; }
        .btn-success { background-color: #28a745; margin-top: 20px; display: none; width: 100%; font-weight: bold; }
        .btn-success:hover { background-color: #218838; }
        
        /* Visualização na tela */
        .ficha { border: 2px solid #000; padding: 15px; margin-bottom: 30px; background: #fff; font-family: monospace; font-size: 13px; text-transform: uppercase; }
        .header-ficha { text-align: center; font-weight: bold; border-bottom: 1px solid #000; padding-bottom: 5px; margin-bottom: 15px; }
        .dados-motorista { display: flex; justify-content: space-between; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; text-align: center; }
        th, td { border: 1px solid #000; padding: 6px; }
        th { background-color: #f0f0f0; }
    </style>
</head>
<body>

<div class="container">
    <h1>Emissor de Ficha de Serviços (Portaria nº 3.626)</h1>
    
    <div class="upload-area">
        <p>Selecione a planilha Excel (.xlsx):</p>
        <input type="file" id="arquivoExcel" accept=".xlsx, .xls">
        <br><br>
        <button onclick="processarPlanilha()">1. Visualizar e Processar Dados</button>
    </div>

    <div id="visualizacao"></div>

    <button id="btnImprimir" class="btn-success" onclick="gerarTXT()">2. Baixar Arquivo TXT para Matricial</button>
</div>

<script>
    let motoristasGlobais = [];

    // 1. Envia o Excel para o Backend
    async function processarPlanilha() {
        const fileInput = document.getElementById('arquivoExcel');
        if (fileInput.files.length === 0) {
            alert("Por favor, selecione um arquivo Excel primeiro.");
            return;
        }

        const formData = new FormData();
        formData.append("planilha", fileInput.files[0]);

        try {
            const response = await fetch('/processar-excel', { method: 'POST', body: formData });
            if (!response.ok) throw new Error("Erro ao processar arquivo no servidor.");

            motoristasGlobais = await response.json();
            
            if (motoristasGlobais.length === 0) {
                alert("O Excel foi lido, mas nenhum motorista foi encontrado. Verifique o padrão da planilha.");
                return;
            }

            renderizarVisualizacao(motoristasGlobais);
            document.getElementById('btnImprimir').style.display = 'block';

        } catch (error) {
            console.error(error);
            alert("Erro ao ler a planilha. O servidor backend está rodando?");
        }
    }

    // 2. Desenha os dados na tela do navegador
    function renderizarVisualizacao(motoristas) {
        const divVisualizacao = document.getElementById('visualizacao');
        divVisualizacao.innerHTML = ''; 

        motoristas.forEach(mot => {
            let html = `
                <div class="ficha">
                    <div class="header-ficha">Visualização dos Dados Extraídos</div>
                    <div class="dados-motorista">
                        <div>
                            <strong>EMPRESA:</strong> 001 TURISMO PAVAO LTDA<br>
                            <strong>FILIAL:</strong> 10<br>
                            <strong>NOME:</strong> ${mot.nome}<br>
                            <strong>CHAPA:</strong> ${mot.id}
                        </div>
                        <div style="text-align: right;">
                            <strong>DATA:</strong> ${mot.data}<br>
                            <strong>FUNÇÃO:</strong> MOTORISTA MIC
                        </div>
                    </div>
                    <table>
                        <tr>
                            <th>LINHA</th><th>VEÍCULO</th><th>CHK 1</th><th>DES 1</th>
                            <th>PT INICIAL</th><th>PT FINAL</th><th>DES 2</th><th>CHK 2</th>
                        </tr>
            `;
            
            mot.viagens.forEach(v => {
                html += `
                    <tr>
                        <td>${v.linha || ''}</td>
                        <td>${v.veiculo || ''}</td>
                        <td>${v.checkList1 || ''}</td>
                        <td>${v.deslocamento1 || ''}</td>
                        <td>${v.pontoInicial || ''}</td>
                        <td>${v.pontoFinal || ''}</td>
                        <td>${v.deslocamento2 || ''}</td>
                        <td>${v.checkList2 || ''}</td>
                    </tr>
                `;
            });

            html += `</table></div>`;
            divVisualizacao.innerHTML += html;
        });
    }

    // 3. Função Auxiliar para posicionar o texto na coluna exata
    function inserirNaPosicao(linhaBase, textoParaInserir, posicaoInicial) {
        if (!textoParaInserir) return linhaBase;
        const texto = String(textoParaInserir).toUpperCase();
        return linhaBase.substring(0, posicaoInicial) + texto + linhaBase.substring(posicaoInicial + texto.length);
    }

    // 4. Monta o TXT com as medidas exatas da régua
    // 4. Monta o TXT com as medidas exatas da régua
    function gerarTXT() {
    let textoFinal = "";
    
    // Criamos uma única página de teste
    // Baseado no seu papel de 14cm (33 linhas) e 21cm (82 colunas)
    let pagina = Array(33).fill("".padEnd(82, " "));

    // 1. Criamos uma régua horizontal no topo (Colunas)
    // Isso vai imprimir 1234567890 repetidamente para você contar as colunas
    let reguaHorizontal = "";
    for (let i = 0; i < 8.2; i++) reguaHorizontal += "1234567890";
    pagina[0] = reguaHorizontal;

    // 2. Criamos uma régua vertical na lateral (Linhas)
    // Isso vai imprimir o número da linha no início de cada uma
    for (let l = 1; l < 33; l++) {
        let numLinha = String(l).padStart(2, '0');
        // Preenchemos a linha com o seu próprio número para facilitar a leitura
        pagina[l] = numLinha + " " + ".".repeat(79);
    }

    // 3. Marcamos pontos estratégicos que você mediu para conferência
    // Empresa (4,5cm -> Coluna 18 aprox)
    pagina[3] = inserirNaPosicao(pagina[3], "#### EMPRESA AQUI (LINHA 4) ####", 18);
    // Nome (10,2cm -> Coluna 40 aprox)
    pagina[3] = inserirNaPosicao(pagina[3], "#### NOME AQUI ####", 40);

    let conteudoTeste = pagina.join("\n") + "\f";

    const blob = new Blob([conteudoTeste], { type: "text/plain" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "GABARITO_CALIBRACAO.txt";
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}
</script>

</body>
</html>
