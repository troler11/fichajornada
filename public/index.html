<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Emissor Pavao - Calibrado</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f9; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .upload-area { margin: 20px 0; padding: 20px; border: 2px dashed #0056b3; text-align: center; }
        button { padding: 10px 15px; cursor: pointer; background-color: #0056b3; color: white; border: none; border-radius: 5px; }
        .btn-success { background-color: #28a745; margin-top: 20px; display: none; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Emissor de Ficha de Serviços</h1>
    <div class="upload-area">
        <input type="file" id="arquivoExcel" accept=".xlsx, .xls">
        <br><br>
        <button onclick="processarPlanilha()">1. Carregar Dados</button>
    </div>
    <div id="visualizacao"></div>
    <button id="btnImprimir" class="btn-success" onclick="gerarTXT()">2. Gerar TXT (0,08cm Topo)</button>
</div>

<script>
    let motoristasGlobais = [];

    // Função para Processar Planilha
    async function processarPlanilha() {
        const fileInput = document.getElementById('arquivoExcel');
        if (fileInput.files.length === 0) {
            alert("Selecione um arquivo!");
            return;
        }

        const formData = new FormData();
        formData.append("planilha", fileInput.files[0]);

        try {
            const response = await fetch('/processar-excel', { method: 'POST', body: formData });
            motoristasGlobais = await response.json();
            
            if (motoristasGlobais.length > 0) {
                document.getElementById('visualizacao').innerHTML = `<p style="color:green">✔ ${motoristasGlobais.length} motoristas carregados.</p>`;
                document.getElementById('btnImprimir').style.display = 'block';
            }
        } catch (e) {
            alert("Erro ao carregar dados. O servidor está rodando?");
        }
    }

    // Função de Posicionamento
    function inserirNaPosicao(linhaBase, texto, pos) {
        if (!texto) return linhaBase;
        const txt = String(texto).toUpperCase();
        return linhaBase.substring(0, pos) + txt + linhaBase.substring(pos + txt.length);
    }

    // Função para Gerar o TXT
    function gerarTXT() {
        let textoFinal = "";
        
        // Comandos ESC/P para Fonte Tamanho 10 (Pica)
        const ESC_RESET = String.fromCharCode(27, 64);       // Reseta tudo
        const FONTE_10_CPI = String.fromCharCode(18);        // Cancelar condensado (Ativa 10 CPI)
        const SELECIONAR_PICA = String.fromCharCode(27, 77); // Garante o modo Pica (10 CPI)
        const ESPACAMENTO_LINHA = String.fromCharCode(27, 51, 30); // Ajuste da altura da linha

        motoristasGlobais.forEach(mot => {
            // No tamanho 10, o papel de 21cm suporta exatamente 80 a 82 colunas
            let pagina = Array(33).fill("".padEnd(82, " "));

            // ====================================================================
            // CABEÇALHO - AJUSTADO PARA 1,0 CM (LINHA 1) E FONTE 10
            // ====================================================================
            
            // LINHA 0 - Vazia para dar o recuo do topo
            // LINHA 1 - OS (12,5cm / 2,54 * 10 = Coluna 49)
            pagina[1] = inserirNaPosicao(pagina[1], "OS: 001", 49); 

            // LINHA 2 - Empresa / Nome / Data
            pagina[2] = inserirNaPosicao(pagina[2], "001 TURISMO PAVAO LTDA", 18); // 4,5cm -> Col 18
            pagina[2] = inserirNaPosicao(pagina[2], mot.nome.substring(0, 20), 41); // 10,4cm -> Col 41
            pagina[2] = inserirNaPosicao(pagina[2], mot.data, 67);                  // 17cm -> Col 67

            // LINHA 3 - Filial / Chapa / Função
            pagina[3] = inserirNaPosicao(pagina[3], "10", 18);                     
            pagina[3] = inserirNaPosicao(pagina[3], mot.id, 41);                   
            pagina[3] = inserirNaPosicao(pagina[3], "MOTORISTA MIC", 67);

            // VIAGENS (Início na linha 6 para manter 2,7cm do topo)
            let linhaAtual = 6; 
            mot.viagens.forEach(v => {
                if(linhaAtual < 32) {
                    let str = "".padEnd(82, " ");
                    str = inserirNaPosicao(str, (v.linha || ""), 0);
                    str = inserirNaPosicao(str, (v.veiculo || ""), 10);
                    str = inserirNaPosicao(str, (v.checkList1 || ""), 22);
                    str = inserirNaPosicao(str, (v.deslocamento1 || ""), 30);
                    str = inserirNaPosicao(str, (v.pontoInicial || ""), 40);
                    str = inserirNaPosicao(str, (v.pontoFinal || ""), 50);
                    str = inserirNaPosicao(str, (v.deslocamento2 || ""), 60);
                    str = inserirNaPosicao(str, (v.checkList2 || ""), 70);
                    pagina[linhaAtual] = str;
                    linhaAtual += 2;
                }
            });

            // Montagem da página: Reset -> Forçar 10 CPI -> Conteúdo -> Pula Página
            let conteudo = ESC_RESET + FONTE_10_CPI + SELECIONAR_PICA + ESPACAMENTO_LINHA + pagina.join("\n");
            textoFinal += conteudo.normalize("NFD").replace(/[\u0300-\u036f]/g, "") + "\f"; 
        });

        const blob = new Blob([textoFinal], { type: "text/plain" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "ficha_fonte_10.txt";
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>

</body>
</html>
