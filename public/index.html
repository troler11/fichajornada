<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Emissor Pavao - Calibração Final LX-350</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f9; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        button { padding: 12px 20px; cursor: pointer; background-color: #0056b3; color: white; border: none; border-radius: 5px; width: 100%; font-weight: bold; }
        .upload-area { margin: 20px 0; padding: 20px; border: 2px dashed #0056b3; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>Emissor de Ficha de Serviços - PAVAO</h1>
    <div class="upload-area">
        <input type="file" id="arquivoExcel" accept=".xlsx, .xls">
        <br><br>
        <button onclick="processarPlanilha()">1. Carregar Dados</button>
    </div>
    <div id="visualizacao"></div>
    <button id="btnImprimir" style="display:none; background-color: #28a745;" onclick="gerarTXT()">2. Gerar TXT (Ajustado)</button>
</div>

<script>
    let motoristasGlobais = [];

    async function processarPlanilha() {
        const fileInput = document.getElementById('arquivoExcel');
        if (fileInput.files.length === 0) { alert("Selecione um arquivo!"); return; }
        const formData = new FormData();
        formData.append("planilha", fileInput.files[0]);
        try {
            const response = await fetch('/processar-excel', { method: 'POST', body: formData });
            motoristasGlobais = await response.json();
            if (motoristasGlobais.length > 0) {
                document.getElementById('visualizacao').innerHTML = `<p style="color:green; text-align:center;">✔ ${motoristasGlobais.length} motoristas carregados.</p>`;
                document.getElementById('btnImprimir').style.display = 'block';
            }
        } catch (e) { alert("Erro ao carregar dados."); }
    }

    function inserirNaPosicao(linhaBase, texto, pos) {
        if (!texto) return linhaBase;
        const txt = String(texto).toUpperCase();
        if (pos + txt.length > linhaBase.length) {
            linhaBase = linhaBase.padEnd(pos + txt.length, " ");
        }
        return linhaBase.substring(0, pos) + txt + linhaBase.substring(pos + txt.length);
    }

    function gerarTXT() {
        let textoFinal = "";

        motoristasGlobais.forEach(mot => {
            // Criamos uma linha larga (130 colunas) para evitar cortes do Windows
            let pagina = Array(33).fill("".padEnd(130, " "));

            // --- CABEÇALHO (Ajustado para Fonte 12 CPI / Elite) ---
            
            // OS: Alvo 12,5cm -> Coluna 60
            pagina[1] = inserirNaPosicao(pagina[1], "OS: 001", 62); 

            // LINHA 2 (1,5cm topo)
            // Empresa: Alvo 4,5cm -> Coluna 12
            pagina[2] = inserirNaPosicao(pagina[2], "001 TURISMO PAVAO LTDA", 16); 
            // Nome: Alvo 10,2cm -> Coluna 40
            pagina[2] = inserirNaPosicao(pagina[2], mot.nome.substring(0, 25), 45); 
            // Data: Alvo 17,5cm -> Coluna 82 (Aqui ele vai chegar no fim da folha!)
            pagina[2] = inserirNaPosicao(pagina[2], mot.data, 90);                 

            // LINHA 3 (1,8cm topo)
            pagina[3] = inserirNaPosicao(pagina[3], "10", 16);                     
            pagina[3] = inserirNaPosicao(pagina[3], mot.id, 45);                   
            pagina[3] = inserirNaPosicao(pagina[3], "MOTORISTA MIC", 90);          

            // --- VIAGENS (Início 0,8cm da esquerda na Coluna 2) ---
            let linhaAtual = 6; 
            mot.viagens.forEach(v => {
                if(linhaAtual < 32) {
                    let str = "".padEnd(130, " ");
                    str = inserirNaPosicao(str, (v.linha || ""), 0); 
                    str = inserirNaPosicao(str, (v.veiculo || ""), 10);
                    str = inserirNaPosicao(str, (v.checkList1 || ""), 25);
                    str = inserirNaPosicao(str, (v.deslocamento1 || ""), 35);
                    str = inserirNaPosicao(str, (v.pontoInicial || ""), 46);
                    str = inserirNaPosicao(str, (v.pontoFinal || ""), 58);
                    str = inserirNaPosicao(str, (v.deslocamento2 || ""), 70);
                    str = inserirNaPosicao(str, (v.checkList2 || ""), 82);
                    pagina[linhaAtual] = str;
                    linhaAtual += 2;
                }
            });

            let limpo = pagina.map(l => l.trimEnd()).join("\n").normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            textoFinal += limpo + "\f"; 
        });

        const blob = new Blob([textoFinal], { type: "text/plain" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "ficha_ajuste_final_pavao.txt";
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>

</body>
</html>
