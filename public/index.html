<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emissor Ficha de Serviço - Pavao</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f9; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        h1 { font-size: 20px; color: #333; border-bottom: 2px solid #0056b3; padding-bottom: 10px; }
        .upload-area { margin: 20px 0; padding: 30px; border: 2px dashed #0056b3; text-align: center; border-radius: 5px; }
        button { padding: 12px 20px; font-size: 16px; cursor: pointer; background-color: #0056b3; color: white; border: none; border-radius: 5px; transition: 0.3s; }
        button:hover { background-color: #003d7a; }
        .btn-success { background-color: #28a745; margin-top: 20px; display: none; width: 100%; font-weight: bold; }
        .btn-success:hover { background-color: #218838; }
        .ficha-previa { margin-top: 20px; border: 1px solid #ddd; padding: 15px; font-family: monospace; background: #fafafa; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Emissor de Ficha de Serviços (Portaria nº 3.626)</h1>
    
    <div class="upload-area">
        <p>Selecione a planilha Excel para processamento:</p>
        <input type="file" id="arquivoExcel" accept=".xlsx, .xls">
        <br><br>
        <button onclick="processarPlanilha()">1. Carregar e Visualizar Dados</button>
    </div>

    <div id="visualizacao"></div>

    <button id="btnImprimir" class="btn-success" onclick="gerarTXT()">2. Gerar Arquivo para Impressora Matricial</button>
</div>

<script>
    let motoristasGlobais = [];

    // 1. Envia a planilha para o servidor
    async function processarPlanilha() {
        const fileInput = document.getElementById('arquivoExcel');
        if (fileInput.files.length === 0) {
            alert("Selecione um arquivo primeiro.");
            return;
        }

        const formData = new FormData();
        formData.append("planilha", fileInput.files[0]);

        try {
            const response = await fetch('/processar-excel', { method: 'POST', body: formData });
            if (!response.ok) throw new Error("Erro no processamento.");

            motoristasGlobais = await response.json();
            
            if (motoristasGlobais.length === 0) {
                alert("Nenhum dado encontrado na planilha. Verifique o modelo.");
                return;
            }

            renderizarTela(motoristasGlobais);
            document.getElementById('btnImprimir').style.display = 'block';

        } catch (error) {
            console.error(error);
            alert("Erro ao conectar com o servidor.");
        }
    }

    // 2. Mostra uma prévia na tela (apenas para conferência)
    function renderizarTela(motoristas) {
        const div = document.getElementById('visualizacao');
        div.innerHTML = '<h3>Prévia dos dados:</h3>';
        motoristas.forEach(m => {
            div.innerHTML += `<div class="ficha-previa">
                <strong>Motorista:</strong> ${m.nome} | <strong>Data:</strong> ${m.data} | <strong>Viagens:</strong> ${m.viagens.length}
            </div>`;
        });
    }

    // 3. Função de posicionamento por colunas
    function inserirNaPosicao(linhaBase, texto, pos) {
        if (!texto) return linhaBase;
        const txt = String(texto).toUpperCase();
        return linhaBase.substring(0, pos) + txt + linhaBase.substring(pos + txt.length);
    }

    // 4. GERAÇÃO DO ARQUIVO TXT CALIBRADO (82 colunas x 33 linhas)
    function gerarTXT() {
        let textoFinal = "";
        
        // Comando ESC/P para Fonte Condensada (Decimal 15)
        const FONTE_CONDENSADA = String.fromCharCode(15);
        // Comando ESC/P para Reset/Fonte Normal (Decimal 18)
        const FONTE_NORMAL = String.fromCharCode(18);

        motoristasGlobais.forEach(mot => {
            // Criamos a página (82 colunas é o padrão normal, 
            // mas com fonte condensada você pode chegar a 137 se precisar)
            let pagina = Array(33).fill("".padEnd(82, " "));

            // ====================================================================
            // CABEÇALHO - SUBINDO 0,5 CM (REDUÇÃO DE LINHAS)
            // ====================================================================
            
            // LINHA 0 (Onde estava a OS) - Se a OS sumir, suba o papel no rolete!
            pagina[0] = inserirNaPosicao(pagina[0], "OS: 001", 56); 

            // LINHA 1 (Subimos a Empresa/Nome/Data que estavam na Linha 1 para a Linha 1)
            // Mantendo os índices baixos para forçar o topo
            pagina[1] = inserirNaPosicao(pagina[1], "001 TURISMO PAVAO LTDA", 10); 
            pagina[1] = inserirNaPosicao(pagina[1], mot.nome.substring(0, 20), 44); 
            pagina[1] = inserirNaPosicao(pagina[1], mot.data, 75);                 

            // LINHA 2 (Subimos Filial/Chapa/Função para a Linha 2)
            pagina[2] = inserirNaPosicao(pagina[2], "10", 10);                     
            pagina[2] = inserirNaPosicao(pagina[2], mot.id, 44);                   
            pagina[2] = inserirNaPosicao(pagina[2], "MOTORISTA MIC", 74);

            // ====================================================================
            // AJUSTE DAS VIAGENS (Subindo também 1 linha para acompanhar o cabeçalho)
            // ====================================================================
            let linhaAtual = 4; // Era 6, mudamos para 5 para subir ~0,4cm

            mot.viagens.forEach(v => {
                if(linhaAtual < 30) {
                    let str = "".padEnd(82, " ");
                    str = inserirNaPosicao(str, (v.linha || "").substring(0,10), 0);
                    str = inserirNaPosicao(str, (v.veiculo || "").substring(0,7), 6);
                    str = inserirNaPosicao(str, (v.checkList1 || ""), 18);
                    str = inserirNaPosicao(str, (v.deslocamento1 || ""), 28);
                    str = inserirNaPosicao(str, (v.pontoInicial || ""), 38);
                    str = inserirNaPosicao(str, (v.pontoFinal || ""), 48);
                    str = inserirNaPosicao(str, (v.deslocamento2 || ""), 58);
                    str = inserirNaPosicao(str, (v.checkList2 || ""), 68);
                    pagina[linhaAtual] = str;
                    linhaAtual += 2;
                }
            });

            // Adiciona o comando de fonte condensada no INÍCIO da página
            // e o comando de reset/pulo de página no FINAL
            let conteudoPagina = FONTE_CONDENSADA + pagina.join("\n").normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            textoFinal += conteudoPagina + FONTE_NORMAL + "\f"; 
        });

        const blob = new Blob([textoFinal], { type: "text/plain" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "ficha_fonte_pequena.txt";
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>

</body>
</html>
