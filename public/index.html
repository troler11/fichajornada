<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Emissor Pavao - Modo Visual</title>
    <style>
        /* --- ESTILOS DA TELA (VISUALIZAÇÃO) --- */
        body { font-family: Arial, sans-serif; background-color: #555; margin: 0; padding: 20px; text-align: center; }
        .controles { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: inline-block; text-align: left;}
        button { padding: 10px 15px; cursor: pointer; background-color: #0056b3; color: white; border: none; border-radius: 5px; font-weight: bold; }
        .btn-success { background-color: #28a745; margin-left: 10px; display: none; }

        /* --- A FOLHA DE PAPEL VIRTUAL --- */
       /* --- A FOLHA DE PAPEL VIRTUAL (AGORA COM 24CM) --- */
        .folha {
            /* Tamanho exato da folha COM OS FUROS de ponta a ponta */
            width: 24cm; 
            height: 14cm; 
            
            /* Sua imagem escaneada */
            background-image: url('fundo.jpg'); 
            
            /* Força a imagem a esticar/encolher para caber exatamente nos 24x14 */
            background-size: 24cm 14cm;
            background-position: top left;
            background-repeat: no-repeat;
            
            background-color: white;
            margin: 0 auto 20px auto;
            position: relative; 
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            overflow: hidden;
            text-align: left;
        }

        /* --- CONFIGURAÇÕES PARA A HORA DE IMPRIMIR --- */
        @media print {
            body { background: white; margin: 0; padding: 0; }
            .controles { display: none !important; } 
            
            .folha {
                background-image: none !important; /* Esconde a foto na hora de imprimir! */
                box-shadow: none;
                margin: 0;
                page-break-after: always; 
            }

            /* Diz para o Chrome que o papel físico tem 24x14 */
            @page {
                size: 24cm 14cm; 
                margin: 0; 
            }
        }
    </style>
</head>
<body>

<div class="controles">
    <h2>Ficha de Serviço - Modo Visual</h2>
    <input type="file" id="arquivoExcel" accept=".xlsx, .xls">
    <button onclick="processarPlanilha()">1. Carregar Dados</button>
    <button id="btnImprimir" class="btn-success" onclick="window.print()">2. Imprimir Direto</button>
</div>

<div id="areaImpressao"></div>

<script>
    let motoristasGlobais = [];

    // Finge uma resposta do servidor para testes (já que não tenho seu backend)
    // No seu código real, mantenha o seu fetch('/processar-excel')
    async function processarPlanilha() {
        // ... (MANTENHA AQUI O SEU CÓDIGO DE LER O EXCEL) ...
        // Simulando dados para o exemplo:
        motoristasGlobais = [{
            nome: "LUCAS BUENO DA SILVA JUNIOR", data: "31/03/2026", id: "98765",
            viagens: [
                {linha: "LINHA A", veiculo: "V-100", checkList1: "08:00", pontoInicial: "08:30", pontoFinal: "09:00", checkList2: "09:15"},
                {linha: "LINHA B", veiculo: "V-200", checkList1: "10:00", pontoInicial: "10:30", pontoFinal: "11:00", checkList2: "11:15"}
            ]
        }];

        gerarTelasVisuais();
        document.getElementById('btnImprimir').style.display = 'inline-block';
    }

    function gerarTelasVisuais() {
        const area = document.getElementById('areaImpressao');
        area.innerHTML = ""; // Limpa a tela

        motoristasGlobais.forEach(mot => {
            let htmlFolha = `<div class="folha">`;

            // ==========================================================
            // A MÁGICA AQUI: POSIÇÕES EM CENTÍMETROS!
            // Basta mudar o top (cima para baixo) e o left (esquerda para direita)
            // ==========================================================

            // LINHA 1
            htmlFolha += `<div class="campo" style="top: 1.0cm; left: 12.5cm;">OS: 001</div>`;

            // LINHA 2
            htmlFolha += `<div class="campo" style="top: 1.5cm; left: 4.5cm;">001 TURISMO PAVAO LTDA</div>`;
            htmlFolha += `<div class="campo" style="top: 1.5cm; left: 10.2cm;">${mot.nome.substring(0, 25)}</div>`;
            htmlFolha += `<div class="campo" style="top: 1.5cm; left: 17.5cm;">${mot.data}</div>`;

            // LINHA 3
            htmlFolha += `<div class="campo" style="top: 1.8cm; left: 4.5cm;">10</div>`;
            htmlFolha += `<div class="campo" style="top: 1.8cm; left: 10.2cm;">${mot.id}</div>`;
            htmlFolha += `<div class="campo" style="top: 1.8cm; left: 17.5cm;">MOTORISTA MIC</div>`;

            // VIAGENS
            let topoViagem = 2.7; // Começa em 2,7 cm
            mot.viagens.forEach(v => {
                htmlFolha += `<div class="campo" style="top: ${topoViagem}cm; left: 0.8cm;">${v.linha || ""}</div>`;
                htmlFolha += `<div class="campo" style="top: ${topoViagem}cm; left: 3.0cm;">${v.veiculo || ""}</div>`;
                htmlFolha += `<div class="campo" style="top: ${topoViagem}cm; left: 6.0cm;">${v.checkList1 || ""}</div>`;
                htmlFolha += `<div class="campo" style="top: ${topoViagem}cm; left: 8.0cm;">${v.deslocamento1 || ""}</div>`;
                htmlFolha += `<div class="campo" style="top: ${topoViagem}cm; left: 10.0cm;">${v.pontoInicial || ""}</div>`;
                htmlFolha += `<div class="campo" style="top: ${topoViagem}cm; left: 12.5cm;">${v.pontoFinal || ""}</div>`;
                htmlFolha += `<div class="campo" style="top: ${topoViagem}cm; left: 15.0cm;">${v.deslocamento2 || ""}</div>`;
                htmlFolha += `<div class="campo" style="top: ${topoViagem}cm; left: 17.5cm;">${v.checkList2 || ""}</div>`;
                
                topoViagem += 0.8; // Pula 0,8 cm para a próxima linha de viagem
            });

            htmlFolha += `</div>`;
            area.innerHTML += htmlFolha;
        });
    }
</script>

</body>
</html>
